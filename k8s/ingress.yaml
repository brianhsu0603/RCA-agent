# Requires the AWS Load Balancer Controller installed in the cluster (see
# DEPLOYMENT.md) - it watches Ingress objects with ingressClassName: alb and
# provisions an internet-facing ALB. No domain/ACM cert configured by default;
# the app is reachable over plain HTTP at the ALB's generated hostname
# (`kubectl get ingress -n rca-agent` to find it). Add a `host:` rule plus
# alb.ingress.kubernetes.io/certificate-arn once you have a domain + ACM cert.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rca-agent
  namespace: rca-agent
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Uses an externally-managed SG (created + whitelisted via the AWS
    # Console) instead of letting the controller auto-create/manage one, so
    # the allowed IP is configured in AWS, not committed to git. Update the
    # inbound rule on this SG directly in the console if your IP changes.
    alb.ingress.kubernetes.io/security-groups: sg-008efdd414e1c62a9
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
