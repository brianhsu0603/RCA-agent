apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: rca-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: rca-agent-backend:latest # replaced by kustomization.yaml `images:` / CI - same image as backend, different command
          args: ["worker"]
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: rca-agent-worker
            - name: DD_ENV
              value: production
          envFrom:
            - secretRef:
                name: backend-env
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
