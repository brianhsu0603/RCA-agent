# Requires the External Secrets Operator installed in the `external-secrets`
# namespace with its service account annotated with the IRSA role ARN from
# `terraform output external_secrets_role_arn` (see DEPLOYMENT.md).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1 # must match var.aws_region in infra/terraform
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
