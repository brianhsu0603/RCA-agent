apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: rca-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rca-agent-backend:latest # replaced by kustomization.yaml `images:` / CI
          args: ["api"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
