services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rca}
      POSTGRES_DB: ${POSTGRES_DB:-rca}
    ports:
      - "${HOST_POSTGRES_PORT:-5442}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rca}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${HOST_REDIS_PORT:-6389}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: ["./entrypoint.sh", "api"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://rca:rca@db:5432/rca}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UVICORN_RELOAD: "1"
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: rca-agent-backend
    ports:
      - "${HOST_BACKEND_PORT:-8010}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  worker:
    build: ./backend
    command: ["./entrypoint.sh", "worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://rca:rca@db:5432/rca}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: rca-agent-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: ["datadog"] # opt-in: `docker compose --profile datadog up`
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "false"
      DD_PROCESS_AGENT_ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro

  frontend:
    build: ./frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "${HOST_FRONTEND_PORT:-5183}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${HOST_BACKEND_PORT:-8010}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  db_data:
