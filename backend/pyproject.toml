[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
# Anthropic tool-use JSON schemas - long natural-language descriptions are the
# point, not something to wrap.
"app/agents/tool_specs.py" = ["E501"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's `Depends(...)` (and Query/Body/etc.) in argument defaults is the
# idiomatic pattern, not the mutable-default-argument bug B008 looks for.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
